<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color changer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container" id="main-container">
        <h1 class="heading">Pick any color from the list to change the color of body</h1>
        <div class="box-colors">
            <div class="boxes" id="red"></div>
            <div class="boxes" id="blue"></div>
            <div class="boxes" id="green"></div>
            <div class="boxes" id="orange"></div>
            <div class="boxes" id="pink"></div>
            <div class="boxes" id="maroon"></div>
        </div>
        <button class="reset">Reset color</button>
    </div>
</body>
<script src="script.js"></script>
</html>
