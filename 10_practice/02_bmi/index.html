<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BMI Calculator</h1>
        <form class="form">
            <div class="text">Enter your height in cm</div>
            <input type="text" id="height" class="input" placeholder="Enter your height in cm">
            <div class="text">Enter your weight in kg</div>
            <input type="text" id="weight" class="input" placeholder="Enter your weight in kg">
            <button type="submit" id="calculate" class="button">Calculate</button>
        </form>
        <div class="result"></div>
    </div>
</body>
<script src="script.js"></script>
</html>
