<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="heading">Guess The Number between 1 and 100</h1>
        <form class="form">
            <label class="label" for="number">Try guessing the number within <span class="number-of-guesses" id="limit">10</span> guesses.</label>
            <input type="text" class="input" placeholder="Enter your number here">
            <button type="submit" class="button">Enter</button>
        </form>
        <div class="instructions"></div>
        
        <h4 class="heading">Previous Guessess: <span class="prev-guess"></span> </h1>
    </div>
</body>
<script src="script.js"></script>
</html>
