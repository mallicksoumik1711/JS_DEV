    const one = document.getElementById('one')

    // third parameter is default false

    // type, timestamp, preventdefault, target, toElement, srcElement, currentTarget, clientX, clientY, screenX, screenY
    // alt, ctrl, shift, key

    // --------------------------------------------------------------------------------------------------------------------------------

    // in event listener => third parameter is "Event propogation" -------------------------------------------------------------------> IMPORTANT
    // event propogation -> event bubbling  (false)
    //                   -> event capturing (true)

    const ul = document.querySelector('.ul-list')
    ul.addEventListener('click', (e)=>{
        // console.log("clicked inside Ul list")
    }, false)

    const li1 = document.getElementById('one')
    li1.addEventListener('click', (e)=>{
        // console.log("clicked inside Li one")
        // e.stopPropagation()
    }, false)

    // ul => click anywhere in ul
    // li => li is inside ul so li one will print then ul list

    // event bubbling (false) => data flows from child level to parent level
    // event capturing (true) => parent to child

    // stop event propogation => e.stopPropogation()
    // this wont work when true event capturing

    const link = document.getElementById('link')
    link.addEventListener('click', (e) => {
        e.preventDefault()
        // console.log("Prevented on going to google")
    }, false)

    // when true event capturing e.preventDefault wont work
