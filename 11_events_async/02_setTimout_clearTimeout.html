<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <h1>Javascript</h1>
    <button class="stop">Stop</button>
</body>
<script>

    // setTimeout() => its not default js method
    //              => available via browser

    const printMess = () => {
        console.log("print after 2 sec")
    }
    // setTimeout( printMess, 2000 )

    setTimeout ( () => {
        // console.log("print after 2 sec")
    }, 2000)

    // ----------------------------------

    const heading = document.querySelector('h1')
    // console.log(heading)

    const changingtext = setTimeout( () => {
        heading.innerHTML = "javascript typescript nextjs reactjs"
    }, 2000 )

    // clearTimeout()
    // clearTimeout(changingtext)  // it needs some variable where and which timeout to be cleared

    const stop = document.querySelector('button')
    // console.log(stop)

    stop.addEventListener('click', (e) => {
        clearTimeout(changingtext)
        console.log("stopped the changinf text")
    }, false)

</script>
</html>
