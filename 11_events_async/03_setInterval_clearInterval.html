<script>

    }
    setInterval( functionExpression, 2000, "Passed string")

    // ---------------------------------------------------------

    const start = document.querySelector('.start')
    const stop = document.querySelector('.stop')

    start.addEventListener('click', (e)=>{
        const printingName = setInterval(()=>{
            console.log("Hello", Math.floor(Math.random() * 10 + 1))

    }, false)
